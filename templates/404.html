{% extends "base.html" %}
{% load static %}

{% block titulo %}Página não encontrada{% endblock %}

{% block body %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="card shadow-sm">
            <div class="card-body p-5">
                <img src="{% static 'logo_paroquia_png.png' %}" alt="Logo da Paróquia"
                     height="110" class="mb-3">
                <h1 class="display-1 fw-bold text-primary mb-0">404</h1>
                <h4 class="mb-3">Página não encontrada</h4>
                <p class="text-muted">
                    A página que você tentou acessar não existe ou foi movida.
                </p>
                <a href="{% url 'dashboard:index' %}" class="btn btn-primary mt-3">
                    <i class="bi bi-house-door"></i> Voltar para a Home
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
